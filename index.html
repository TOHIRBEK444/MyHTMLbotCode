<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRADUS Premium Music</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
    --primary:#6366f1;
    --accent:#22d3ee;
    --bg-dark-1:#0f172a;
    --bg-dark-2:#1e293b;
    --glass:rgba(255,255,255,0.05);
}

body{
    background: radial-gradient(circle at 10% 10%, var(--bg-dark-2), var(--bg-dark-1));
    color:white;
    min-height:100vh;
    font-family: system-ui;
    transition: all .3s ease;
}

.light-mode{
    background: linear-gradient(135deg,#f1f5f9,#e2e8f0);
    color:#111;
}

.glass{
    background:var(--glass);
    backdrop-filter: blur(25px);
    border:1px solid rgba(255,255,255,0.1);
}

.track-card{
    transition:all .35s ease;
    cursor:pointer;
}

.track-card:hover{
    transform:translateY(-10px);
    box-shadow:0 30px 60px rgba(0,0,0,.6);
}

.fade-in{
    animation:fadeIn .6s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

.skeleton{
    height:320px;
    border-radius:20px;
    background:linear-gradient(90deg,#1e293b,#334155,#1e293b);
    background-size:200% 100%;
    animation:loading 1.2s infinite;
}

@keyframes loading{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
}

.toggle-btn{
    position:absolute;
    right:20px;
    top:20px;
    cursor:pointer;
}

input:focus{
    box-shadow:none !important;
}
</style>
</head>

<body class="p-4">

<div class="toggle-btn">
    <button class="btn btn-outline-light" onclick="toggleTheme()">🌗</button>
</div>

<div class="container">

    <div class="text-center mb-5">
        <h1 class="fw-bold text-5xl">🎵 KRADUS Premium Music</h1>
        <p class="text-gray-400">Ultra Smooth Music Experience</p>
    </div>

    <!-- Search -->
    <div class="glass p-4 rounded-4 shadow-lg mb-5">
        <div class="input-group">
            <input type="text"
                   id="searchInput"
                   class="form-control form-control-lg"
                   placeholder="Search music..."
                   onkeydown="if(event.key==='Enter') searchMusic()">
            <button class="btn btn-primary px-4"
                    onclick="searchMusic()">
                Search
            </button>
        </div>
    </div>

    <!-- Results -->
    <div id="results" class="row g-4"></div>

</div>

<script>
const API_BASE = "http://localhost:5000";

/* =========================
   THEME TOGGLE
========================= */
function toggleTheme(){
    document.body.classList.toggle("light-mode");
}

/* =========================
   LOADING
========================= */
function showSkeleton(){
    const results = document.getElementById("results");
    results.innerHTML="";
    for(let i=0;i<6;i++){
        results.innerHTML+=`
        <div class="col-md-4">
            <div class="skeleton"></div>
        </div>`;
    }
}

/* =========================
   SEARCH
========================= */
async function searchMusic(){
    const query = document.getElementById("searchInput").value.trim();
    if(!query) return;

    showSkeleton();

    try{
        const res = await fetch(`${API_BASE}/search?search=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderResults(data.results || []);
    }catch{
        document.getElementById("results").innerHTML=
        `<p class="text-center text-danger">Server error</p>`;
    }
}

/* =========================
   RENDER
========================= */
function renderResults(tracks){
    const results = document.getElementById("results");
    results.innerHTML="";

    if(tracks.length === 0){
        results.innerHTML=
        `<p class="text-center text-gray-400">No results found</p>`;
        return;
    }

    tracks.forEach(track=>{
        const col=document.createElement("div");
        col.className="col-md-4 fade-in";

        col.innerHTML=`
        <div class="glass track-card p-3 rounded-4 h-100 d-flex flex-column">
            <img src="${track.artworkUrl || ''}"
                 loading="lazy"
                 class="img-fluid rounded-3 mb-3 w-100"
                 style="height:260px;object-fit:cover;">

            <h5 class="fw-bold">${track.trackName || "Unknown"}</h5>
            <p class="text-gray-400 mb-1">${track.artistName || ""}</p>
            <p class="text-gray-500 small">${track.albumName || ""}</p>

            <audio controls class="w-100 mt-2">
                <source src="${track.previewUrl || ''}" type="audio/mpeg">
            </audio>

            <button class="btn btn-success w-100 mt-3"
                    onclick="downloadTrack('${track.previewUrl}')">
                ⬇ Download
            </button>
        </div>`;

        results.appendChild(col);
    });
}

/* =========================
   DOWNLOAD
========================= */
function downloadTrack(url){
    if(!url) return;
    window.open(`${API_BASE}/download?previewUrl=${encodeURIComponent(url)}`,"_blank");
}
</script>

</body>
</html>
