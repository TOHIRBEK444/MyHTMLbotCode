<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes Pro | 3D Audio-Reactive AI Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f2027; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        
        body { margin: 0; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f2027; }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        .glass {
            background: rgba(20, 30, 48, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-10px) scale(1.03); border-color: rgba(59, 130, 246, 0.6); z-index: 10;}

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        @keyframes spinner { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative">

    <canvas id="bg-canvas"></canvas>

    <div class="z-10 container mx-auto px-4 py-8 flex-grow flex flex-col items-center">
        
        <div class="w-full max-w-4xl text-center mb-10 mt-10">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500 tracking-tight drop-shadow-2xl">
                <i class="fab fa-apple mr-2 text-white"></i>Audio-Reactive iTunes
            </h1>
            <p class="text-gray-300 text-lg font-light">Musiqani tinglang va 3D olam unga qanday javob berishini ko'ring</p>
        </div>

        <div class="glass w-full max-w-4xl p-4 rounded-3xl flex flex-col md:flex-row gap-4 mb-12 relative overflow-hidden">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Musiqa yoki ijodkorni izlang..." 
                    class="w-full pl-14 pr-4 py-4 bg-black/30 border border-gray-600/50 rounded-2xl text-white focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-lg">
            </div>
            
            <select id="mediaType" class="bg-black/30 border border-gray-600/50 text-white py-4 px-6 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all text-lg cursor-pointer">
                <option value="musicTrack">Musiqa</option>
                <option value="movie">Kino</option>
                <option value="podcast">Podkast</option>
            </select>

            <button id="searchBtn" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-[0_0_20px_rgba(147,51,234,0.5)] hover:shadow-[0_0_30px_rgba(147,51,234,0.8)]">
                Qidirish
            </button>
        </div>

        <div id="loading" class="hidden flex-col items-center justify-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
            <p class="text-lg text-purple-400 font-semibold animate-pulse">Ma'lumotlar tahlil qilinmoqda...</p>
        </div>

        <div id="errorMsg" class="hidden glass border border-red-500 text-red-400 px-6 py-4 rounded-xl mb-8 w-full max-w-4xl text-center font-medium"></div>

        <div id="resultsGrid" class="w-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 pb-10"></div>
    </div>

    <script>
        // --- AUDIO VISUALIZER VA 3D MUHIT ---
        let audioContext, analyser, dataArray;
        let isAudioInitialized = false;
        let particlesMesh, particlesGeometry;

        const initThreeJS = () => {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            // Chuqurroq vizual uchun tuman qo'shamiz
            scene.fog = new THREE.FogExp2(0x0f2027, 0.05);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 3000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 20; // x
                posArray[i+1] = (Math.random() - 0.5) * 20; // y
                posArray[i+2] = (Math.random() - 0.5) * 20; // z

                // Ranglarni generatsiya qilish (Binafsharang va Ko'k)
                colorArray[i] = 0.5 + Math.random() * 0.5;   // r
                colorArray[i+1] = 0.2 + Math.random() * 0.3; // g
                colorArray[i+2] = 0.8 + Math.random() * 0.2; // b
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);
            camera.position.z = 5;

            const animate = () => {
                requestAnimationFrame(animate);
                
                // Standart aylanish
                particlesMesh.rotation.y += 0.001;
                
                // Agar musiqa o'ynayotgan bo'lsa, zarrachalarni harakatlantirish
                if (isAudioInitialized && analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let averageFrequency = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    
                    // Bassga qarab zarrachalar hajmini kattalashtirish
                    let scale = 1 + (averageFrequency / 256) * 1.5;
                    particlesMesh.scale.set(scale, scale, scale);
                    particlesMesh.rotation.x += (averageFrequency / 10000);
                } else {
                    // Musiqa yo'q paytda sekin asli holiga qaytish
                    particlesMesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }

                renderer.render(scene, camera);
            };
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

        // --- AUDIO HOOK VA CORS MUAMMOSI YECHIMI ---
        const setupAudio = (audioElement) => {
            if (!isAudioInitialized) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 128; // Tezlik uchun kichikroq o'lcham
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioInitialized = true;
            }

            // Avvalgi ulanishlarni oldini olish
            if (audioElement._isConnected) return;

            const source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            audioElement._isConnected = true;
        };

        const fetchItunesData = async () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return showError("Iltimos, matn kiriting!");

            const media = document.getElementById('mediaType').value;
            // CORS muammosini aylanib o'tish uchun allorigins proxy xizmatidan foydalanamiz
            const targetUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=${media}&limit=20`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            document.getElementById('errorMsg').classList.add('hidden');
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';
            document.getElementById('loading').classList.replace('hidden', 'flex');

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Tarmoq xatoligi");
                
                const proxyData = await response.json();
                const data = JSON.parse(proxyData.contents); // Proxy matn ko'rinishida qaytaradi
                
                if (data.results.length === 0) showError("Hech narsa topilmadi.");
                else renderResults(data.results);
            } catch (error) {
                showError("Xatolik: Tarmoq bloklandi yoki ulanish yo'q. Qayta urinib ko'ring.");
            } finally {
                document.getElementById('loading').classList.replace('flex', 'hidden');
            }
        };

        const showError = (msg) => {
            const err = document.getElementById('errorMsg');
            err.textContent = msg;
            err.classList.remove('hidden');
        };

        const renderResults = (results) => {
            const grid = document.getElementById('resultsGrid');
            
            results.forEach(item => {
                const imgUrl = item.artworkUrl100 ? item.artworkUrl100.replace('100x100bb', '600x600bb') : '';
                const title = item.trackName || item.collectionName || 'Nomsiz';
                const card = document.createElement('div');
                card.className = 'glass rounded-3xl overflow-hidden card-hover flex flex-col group';
                
                let cardHTML = `
                    <div class="relative w-full pt-[100%] overflow-hidden">
                        <img src="${imgUrl}" alt="${title}" class="absolute top-0 left-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-125 group-hover:rotate-3">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent opacity-80"></div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow relative -mt-16 z-10">
                        <h3 class="font-bold text-xl mb-1 text-white drop-shadow-lg truncate">${title}</h3>
                        <p class="text-sm text-purple-300 mb-4 truncate">${item.artistName || 'Noma\'lum'}</p>
                `;

                if(item.previewUrl && (item.kind === 'song' || item.wrapperType === 'track')) {
                    // crossOrigin="anonymous" aynan audio vizualizatsiya uchun zarur
                    cardHTML += `
                        <div class="mt-auto">
                            <audio controls class="w-full h-12 rounded-xl custom-audio" preload="none" crossorigin="anonymous">
                                <source src="${item.previewUrl}" type="audio/mpeg">
                            </audio>
                        </div>
                    `;
                }

                cardHTML += `</div>`;
                card.innerHTML = cardHTML;
                grid.appendChild(card);
            });

            // Barcha audiolarga event listener qo'shish
            document.querySelectorAll('audio').forEach(audio => {
                audio.addEventListener('play', function() {
                    // Boshqa audiolarni to'xtatish
                    document.querySelectorAll('audio').forEach(a => { if(a !== this) a.pause(); });
                    
                    // AudioContext siyosati sababli, foydalanuvchi birinchi marta bosganida Context ni uyg'otamiz
                    if (audioContext && audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    setupAudio(this);
                });
            });
        };

        initThreeJS();
        document.getElementById('searchBtn').addEventListener('click', fetchItunesData);
        document.getElementById('searchInput').addEventListener('keypress', (e) => e.key === 'Enter' && fetchItunesData());
    </script>
</body>
</html>
