<!doctype html>

<!--
  win12-mock-optimized.html
  Optimized and improved single-file Windows-12-style interactive mockup.
  How to use: save as `win12-mock-optimized.html` and open in a modern browser.
  Optional: place your wallpaper image next to this file and set its name in the data-wallpaper attribute below (e.g. wallpaper.webp).
--><html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Windows 12 — Mock (Optimized)</title>
  <meta name="description" content="Soddalashtirilgan, optimallashtirilgan Windows‑12 mockup: tez, responsiv va kirish/foydalanish uchun mos." />  <style>
    /* ===== Lightweight reset & system font (fast, no external load) ===== */
    :root{
      --bg-1:#031025; --bg-2:#07172a; --accent:#3aa0ff; --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08); --radius:14px; --taskbar-h:64px; --maxw:1200px;
      color-scheme: dark;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg-1),var(--bg-2));font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;line-height:1.2;color:#e8f2ff}
    img{max-width:100%;display:block}

    /* ===== Wallpaper (deferred) ===== */
    .wallpaper{position:fixed;inset:0;z-index:0;background-color:var(--bg-2);background-position:center;background-size:cover;filter:contrast(1.03) saturate(1.06) brightness(0.92);will-change:transform;contain:paint;}
    .wallpaper.loading{opacity:0.01;transition:opacity .45s ease}
    .wallpaper.ready{opacity:1}

    /* ===== Subtle noise/overlay (cheap) ===== */
    .overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(120deg,rgba(58,160,255,0.03),transparent 30%), radial-gradient(800px 300px at 85% 15%, rgba(123,97,255,0.04), transparent 10%);mix-blend-mode:screen}

    /* ===== Center header/logo ===== */
    .hero{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding-top:36px;padding-bottom:36px}
    .logo{display:flex;align-items:center;gap:14px;padding:10px 18px;border-radius:16px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(1,6,20,0.6)}
    .logo svg{width:52px;height:52px;flex:0 0 52px}
    .logo h1{margin:0;font-weight:600;font-size:28px}
    .logo .ver{color:var(--accent);font-weight:800;font-size:36px;margin-left:6px}

    /* ===== Start menu (glass) ===== */
    .start{position:fixed;left:50%;top:50%;transform:translate(-50%,36%);z-index:3;width:720px;max-width:92vw;border-radius:var(--radius);padding:14px;display:flex;gap:16px;align-items:flex-start;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid var(--glass-border);box-shadow:0 18px 50px rgba(1,6,18,0.65);backdrop-filter:blur(10px);transition:opacity .18s ease,transform .2s cubic-bezier(.2,.9,.3,1);}
    .start.hidden{opacity:0;transform:translate(-50%,56%);pointer-events:none}
    .col-left{width:430px;display:flex;flex-direction:column;gap:10px}
    .search{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03)}
    .search input{flex:1;border:0;background:transparent;color:inherit;font-size:15px;outline:0}
    .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
    .app{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;border-radius:10px;font-size:12px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent);border:1px solid rgba(255,255,255,0.02)}

    /* ===== Right column ===== */
    .col-right{flex:1;display:flex;flex-direction:column;gap:10px}
    .recommended{background:rgba(255,255,255,0.02);padding:10px;border-radius:10px;min-height:120px}

    /* ===== Taskbar & tray ===== */
    .taskbar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:4;height:var(--taskbar-h);width:78%;max-width:var(--maxw);display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 18px;border-radius:40px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(1,6,20,0.6)}
    .task-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:10px}
    .task-icon.active{background:linear-gradient(180deg, rgba(58,160,255,0.12), rgba(58,160,255,0.06));box-shadow:0 6px 18px rgba(58,160,255,0.06)}

    /* ===== Tiny responsive + reduced-motion ===== */
    @media (max-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.start{width:92vw;left:50%;top:auto;bottom:120px;transform:translateX(-50%)}}
    @media (prefers-reduced-motion:reduce){.start{transition:none}.wallpaper{transition:none}}

    /* ===== Accessibility helpers ===== */
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style></head>
<body>

  <div class="overlay" aria-hidden="true"></div>  <main class="hero" id="main">

        <rect x="34" y="8" width="28" height="24" rx="2" fill="#66D2FF"/>

    <div class="app" tabindex="0" data-name="Settings"><svg width="36" height="36" viewBox="0 0 24 24" aria-hidden><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z" stroke="white" stroke-opacity="0.95" stroke-width="1.2"/></svg><span>Settings</span></div>
  </div>
</div>

<aside class="col-right" aria-label="Tavsiya etilgan">

  </nav>  <div id="tray" style="position:fixed;right:48px;bottom:24px;z-index:5;color:rgba(255,255,255,0.9);font-size:13px">00:42 • March 15</div><button id="srToggle" class="sr-only">Start toggle</button>

  <script>
    /* ===== Performance-minded wallpaper loader ===== */
    (function(){
      const wall = document.getElementById('wall');
      const src = wall.dataset.wallpaper;
      if(!src){ wall.classList.remove('loading'); wall.classList.add('ready'); return }

      // Use requestIdleCallback when available; fallback to DOMContentLoaded
      const load = ()=>{
        const img = new Image(); img.src = src;
        img.onload = ()=>{ wall.style.backgroundImage = `url('${src}')`; wall.classList.remove('loading'); wall.classList.add('ready') }
        img.onerror = ()=>{ wall.classList.remove('loading') }
      };
      if('requestIdleCallback' in window) requestIdleCallback(load,{timeout:1500}); else window.addEventListener('DOMContentLoaded',load,{once:true});
    })();

    /* ===== Start menu interaction: minimal, accessible ===== */
    (function(){
      const start = document.getElementById('start');
      const btn = document.getElementById('toggleStart');
      const search = document.getElementById('search');
      const grid = document.getElementById('grid');

      const toggle = (forced)=>{
        const hidden = start.classList.contains('hidden');
        const shouldHide = typeof forced === 'boolean' ? !forced : !hidden;
        start.classList.toggle('hidden', shouldHide);
        btn.setAttribute('aria-pressed', String(!shouldHide));
        if(!shouldHide) search.focus();
      };

      btn.addEventListener('click', ()=> toggle(true));

      document.addEventListener('keydown', (e)=>{
        if(e.key==='Escape'){ start.classList.add('hidden'); btn.setAttribute('aria-pressed','false'); }
        if((e.metaKey || e.key==='Meta') || (e.ctrlKey && e.key==='Escape')){ toggle(true) }
      });

      // Tiny search: filter by data-name
      search.addEventListener('input', (ev)=>{
        const q = ev.target.value.trim().toLowerCase();
        const apps = grid.querySelectorAll('.app');
        apps.forEach(a=> a.style.display = a.dataset.name.toLowerCase().includes(q) ? 'flex' : 'none');
      });

      // Keyboard: enter to "open" app (demo)
      grid.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){ const app = e.target.closest('.app'); if(app) alert(app.dataset.name + ' ochildi (demo)') }
      });

      // small accessibility: trap focus when menu open on small screens
      window.addEventListener('resize', ()=>{/* could implement focus trap if needed */});
    })();

    /* ===== Small runtime telemetry: avoid heavy work ===== */
    // nothing heavy here — leave hooks for future lazy-loading of actual app data
  </script></body>
</html>
