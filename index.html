<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iTunes Search API Demo</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f6f9fc;
    }
    .card-img-top {
      object-fit: cover;
      height: 180px;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 class="text-center mb-4 text-3xl font-bold text-indigo-600">iTunes Search App</h1>

  <div class="input-group mb-4">
    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search music, artists or albums...">
    <button class="btn btn-indigo bg-indigo-600 hover:bg-indigo-700 text-white" id="searchBtn">Search</button>
  </div>

  <div id="results" class="row g-3"></div>
</div>

<script src="app.js"></script>

</body>
</html>
