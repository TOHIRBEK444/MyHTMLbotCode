<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRADUS Music Search</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg,#0f172a,#020617);
    min-height:100vh;
    color:white;
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
}
.song-card {
    transition: all .3s ease;
}
.song-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
}
.loader {
    border:4px solid rgba(255,255,255,.1);
    border-top:4px solid #3b82f6;
    border-radius:50%;
    width:40px;
    height:40px;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="flex flex-col items-center p-6">

<div class="w-full max-w-4xl glass p-6 rounded-4xl shadow-2xl">

    <h1 class="text-3xl font-bold text-center mb-6 text-blue-400">
        🎵 KRADUS Premium Music Search
    </h1>

    <div class="input-group mb-4">
        <input type="text" id="searchInput" 
               class="form-control rounded-start-pill p-3" 
               placeholder="Musiqa nomini kiriting...">
        <button class="btn btn-primary rounded-end-pill px-4" onclick="searchMusic()">
            Qidirish
        </button>
    </div>

    <div id="loader" class="hidden flex justify-center my-6">
        <div class="loader"></div>
    </div>

    <div id="results" class="grid md:grid-cols-2 gap-4"></div>

    <div class="flex justify-center mt-6 gap-3">
        <button id="prevBtn" class="btn btn-outline-light hidden">Oldingi</button>
        <button id="nextBtn" class="btn btn-outline-light hidden">Keyingi</button>
    </div>

</div>

<script>
let offset = 0;
let limit = 10;
let currentQuery = "";
let totalResults = 0;

async function searchMusic(reset=true) {
    if(reset){
        offset = 0;
    }

    const query = document.getElementById("searchInput").value.trim();
    if(!query){
        alert("Qidiruv so‘zi kiriting!");
        return;
    }

    currentQuery = query;

    document.getElementById("loader").classList.remove("hidden");
    document.getElementById("results").innerHTML = "";

    try {
        const response = await fetch(`api.php?text=${encodeURIComponent(query)}&offset=${offset}&limit=${limit}`);
        const data = await response.json();

        document.getElementById("loader").classList.add("hidden");

        if(data.success){
            totalResults = data.total;
            renderResults(data.results);
            updatePagination();
        } else {
            document.getElementById("results").innerHTML = 
                `<p class="text-red-400 text-center">${data.message}</p>`;
        }
    } catch(error){
        document.getElementById("loader").classList.add("hidden");
        document.getElementById("results").innerHTML = 
            `<p class="text-red-500 text-center">Server xatosi!</p>`;
    }
}

function renderResults(results){
    const container = document.getElementById("results");

    results.forEach(song => {
        container.innerHTML += `
        <div class="song-card glass p-4 rounded-3xl">
            <h5 class="text-lg font-semibold text-blue-300">${song.name}</h5>
            <p class="text-sm text-gray-300">${song.artist}</p>
            <p class="text-xs text-gray-400 mb-3">⏱ ${song.duration}</p>
            <audio controls class="w-full">
                <source src="${song.url}" type="audio/mpeg">
            </audio>
        </div>
        `;
    });
}

function updatePagination(){
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    prevBtn.classList.toggle("hidden", offset === 0);
    nextBtn.classList.toggle("hidden", offset + limit >= totalResults);

    prevBtn.onclick = () => {
        offset -= limit;
        searchMusic(false);
    };

    nextBtn.onclick = () => {
        offset += limit;
        searchMusic(false);
    };
}
</script>

</body>
</html>
